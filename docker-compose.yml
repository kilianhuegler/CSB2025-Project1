services:
  devnotes:
    build:
      context: ./webapp
      dockerfile_inline: |
        FROM python:3.12-slim
        RUN useradd -m -s /bin/bash appuser
        RUN mkdir -p /var/lib/devnotes && chown appuser:appuser /var/lib/devnotes
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY ./src ./src
        RUN chown -R appuser:appuser /app
        USER appuser
        WORKDIR /app/src
        EXPOSE 5000
        ENV PYTHONUNBUFFERED=1
        CMD ["python", "app.py"]
    container_name: devnotes
    ports:
      - "5000:5000"
    restart: unless-stopped